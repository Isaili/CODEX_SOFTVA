<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Becarios | Softvana</title>
  <link rel="icon" type="image/png" href="../icons/favicon1.png" />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #050a12;
      color: #e8f0fe;
      font-family: 'DM Sans', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      overflow: hidden;
      padding: 24px;
    }
    .orb {
      position: fixed; border-radius: 50%;
      filter: blur(80px); pointer-events: none; z-index: 0;
    }
    .orb1 { width: 400px; height: 400px; background: radial-gradient(circle, rgba(0,114,255,.2), transparent 70%); top: -100px; left: -100px; }
    .orb2 { width: 350px; height: 350px; background: radial-gradient(circle, rgba(0,229,160,.15), transparent 70%); bottom: -80px; right: -80px; }
    .grid {
      position: fixed; inset: 0; z-index: 0;
      background-image:
        linear-gradient(rgba(0,198,255,.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0,198,255,.04) 1px, transparent 1px);
      background-size: 60px 60px;
      mask-image: radial-gradient(ellipse 70% 70% at 50% 50%, black, transparent);
    }
    .content {
      position: relative; z-index: 1;
      max-width: 560px; width: 100%;
    }
    .badge {
      display: inline-flex; align-items: center; gap: 8px;
      background: rgba(0,198,255,.08); border: 1px solid rgba(0,198,255,.2);
      color: #00c6ff; border-radius: 50px; padding: 7px 18px;
      font-size: .78rem; font-weight: 600; letter-spacing: .5px;
      margin-bottom: 32px;
    }
    .badge::before { content: '●'; font-size: .5rem; animation: pulse 2s infinite; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.3} }
    .icon { font-size: 4rem; margin-bottom: 24px; animation: float 3s ease-in-out infinite; }
    @keyframes float { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-12px)} }
    h1 {
      font-family: 'Syne', sans-serif;
      font-size: clamp(1.8rem, 5vw, 3rem);
      font-weight: 800; letter-spacing: -1px;
      margin-bottom: 16px; line-height: 1.15;
    }
    h1 span {
      background: linear-gradient(135deg, #00c6ff, #00e5a0);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    }
    p { color: #7a90b0; font-size: 1rem; line-height: 1.8; margin-bottom: 40px; }
    .progress-wrap {
      background: rgba(255,255,255,.05); border: 1px solid rgba(0,198,255,.12);
      border-radius: 12px; padding: 20px 24px; margin-bottom: 36px; text-align: left;
    }
    .progress-label {
      display: flex; justify-content: space-between;
      font-size: .8rem; color: #7a90b0; margin-bottom: 10px;
    }
    .progress-label span:last-child { color: #00c6ff; font-weight: 600; }
    .progress-track { height: 6px; background: rgba(255,255,255,.06); border-radius: 10px; overflow: hidden; }
    .progress-fill {
      height: 100%; width: 0;
      background: linear-gradient(90deg, #0072ff, #00c6ff);
      border-radius: 10px; animation: grow 2s ease forwards;
    }
    @keyframes grow { to { width: 35%; } }
    .btn {
      display: inline-flex; align-items: center; gap: 8px;
      background: linear-gradient(135deg, #0072ff, #00c6ff);
      color: #fff; padding: 14px 32px; border-radius: 50px;
      font-family: 'Syne', sans-serif; font-weight: 700; font-size: .95rem;
      text-decoration: none; transition: transform .2s, box-shadow .2s;
      box-shadow: 0 4px 24px rgba(0,114,255,.35);
    }
    .btn:hover { transform: translateY(-3px); box-shadow: 0 12px 36px rgba(0,114,255,.5); }
    .logo {
      position: fixed; top: 24px; left: 50%; transform: translateX(-50%);
      font-family: 'Syne', sans-serif; font-weight: 800; font-size: 1.3rem;
      background: linear-gradient(90deg, #00c6ff, #00e5a0);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      z-index: 10; text-decoration: none;
    }
    .logo span { -webkit-text-fill-color: #7a90b0; font-weight: 400; }
  </style>
</head>
<body>

  <div class="orb orb1"></div>
  <div class="orb orb2"></div>
  <div class="grid"></div>

  <a href="index.html" class="logo">Soft<span>vana</span></a>

  <div class="content">
    <div class="badge">🎓 Próximamente · Softvana</div>
    <div class="icon">🚀</div>
    <h1>Sección de Becarios<br><span>en Desarrollo</span></h1>
    <p>Estamos construyendo un espacio especial para jóvenes talentos que quieran crecer junto a nosotros. Pronto podrás postularte para formar parte del equipo Softvana.</p>
    <div class="progress-wrap">
      <div class="progress-label">
        <span>Progreso de desarrollo</span>
        <span>35%</span>
      </div>
      <div class="progress-track">
        <div class="progress-fill"></div>
      </div>
    </div>
    <a href="../index.html" class="btn">← Volver al inicio</a>
  </div>

</body>
</html>
